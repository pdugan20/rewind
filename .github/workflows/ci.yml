name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Lint OpenAPI spec
        run: npm run lint:api

      - name: Validate Claude Code files
        run: npm run lint:claude

      - name: Check unused dependencies
        run: npm run lint:deps -- --no-exit-code

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - run: npm ci

      - name: Run automation policy tests
        run: npm run test:automation-policy

      - name: Run tests
        run: npm test

  docs:
    name: Docs Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - run: npm ci

      - name: Check MCP tool reference is up to date
        run: npm exec -- tsx scripts/gen-mcp-reference.ts --check

      - name: Check broken links
        run: npm exec -- mint broken-links
        working-directory: docs-mintlify

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - run: npm ci

      - name: Build (dry run)
        run: npm run build

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=critical --omit=dev

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, docs, build, security, dependency-review]
    steps:
      - name: Require every diagnostic job
        run: |
          test "${{ needs.lint.result }}" = "success" || exit 1
          test "${{ needs.test.result }}" = "success" || exit 1
          test "${{ needs.docs.result }}" = "success" || exit 1
          test "${{ needs.build.result }}" = "success" || exit 1
          test "${{ needs.security.result }}" = "success" || exit 1
          case "${{ needs.dependency-review.result }}" in
            success|skipped) ;;
            *) exit 1 ;;
          esac
